<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Recorder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }

    h1 { font-size: 1.6rem; margin-bottom: 24px; }
    h2 { font-size: 1.1rem; margin: 32px 0 12px; }

    #search-form {
      display: flex;
      gap: 8px;
    }

    #input-wrap {
      position: relative;
      flex: 1;
    }

    #city-input {
      width: 100%;
      padding: 8px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    #suggest-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 4px 4px;
      list-style: none;
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }

    #suggest-list li {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    #suggest-list li:hover { background: #f0f0f0; }

    button {
      padding: 8px 18px;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid #555;
      border-radius: 4px;
      background: #333;
      color: #fff;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #error {
      margin-top: 14px;
      padding: 10px 14px;
      background: #fff0f0;
      border: 1px solid #f99;
      border-radius: 4px;
      color: #c00;
    }

    #result {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
    }

    #result h2 { margin-top: 0; font-size: 1.2rem; }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .weather-item label {
      display: block;
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .weather-item span {
      font-size: 1.1rem;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #e5e5e5;
    }

    th { background: #f4f4f4; font-weight: 600; }
    tr:hover td { background: #fafafa; }

    #empty-history {
      color: #888;
      font-size: 0.9rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <h1>Weather Recorder</h1>

  <form id="search-form">
    <div id="input-wrap">
      <input id="city-input" type="text" placeholder="Enter a city name…" autocomplete="off" required />
      <ul id="suggest-list" hidden></ul>
    </div>
    <button id="search-btn" type="submit">Search</button>
  </form>

  <div id="error" hidden></div>

  <div id="result" hidden>
    <h2 id="result-heading"></h2>
    <div class="weather-grid">
      <div class="weather-item"><label>Temperature</label><span id="r-temp"></span></div>
      <div class="weather-item"><label>Feels Like</label><span id="r-feels"></span></div>
      <div class="weather-item"><label>Humidity</label><span id="r-humidity"></span></div>
      <div class="weather-item"><label>Wind Speed</label><span id="r-wind"></span></div>
      <div class="weather-item"><label>Condition</label><span id="r-desc"></span></div>
    </div>
  </div>

  <h2>Search History</h2>
  <p id="empty-history" hidden>No searches yet.</p>
  <table id="history-table" hidden>
    <thead>
      <tr>
        <th>City</th>
        <th>Region</th>
        <th>Country</th>
        <th>Temp (°C)</th>
        <th>Feels Like (°C)</th>
        <th>Humidity (%)</th>
        <th>Wind (km/h)</th>
        <th>Condition</th>
        <th>Searched At</th>
      </tr>
    </thead>
    <tbody id="history-body"></tbody>
  </table>

  <script>
    const form       = document.getElementById('search-form');
    const input      = document.getElementById('city-input');
    const btn        = document.getElementById('search-btn');
    const errorBox   = document.getElementById('error');
    const result     = document.getElementById('result');
    const histTable  = document.getElementById('history-table');
    const histBody   = document.getElementById('history-body');
    const emptyMsg   = document.getElementById('empty-history');
    const suggestList = document.getElementById('suggest-list');

    let selectedLoc = null;
    let debounceTimer = null;

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.hidden = false;
    }

    function clearError() {
      errorBox.hidden = true;
      errorBox.textContent = '';
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString();
    }

    function formatLoc(item) {
      const parts = [item.name];
      if (item.admin1) parts.push(item.admin1);
      if (item.country) parts.push(item.country);
      return parts.join(', ');
    }

    function clearSuggest() {
      suggestList.innerHTML = '';
      suggestList.hidden = true;
    }

    input.addEventListener('input', () => {
      selectedLoc = null;
      clearSuggest();
      const q = input.value.trim();
      if (q.length < 2) return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(async () => {
        try {
          const res = await fetch(`/api/suggest?q=${encodeURIComponent(q)}`);
          if (!res.ok) return;
          const items = await res.json();
          if (!items.length) { clearSuggest(); return; }
          suggestList.innerHTML = '';
          items.forEach(item => {
            const li = document.createElement('li');
            li.textContent = formatLoc(item);
            li.addEventListener('mousedown', (e) => {
              e.preventDefault();
              selectedLoc = item;
              input.value = formatLoc(item);
              clearSuggest();
            });
            suggestList.appendChild(li);
          });
          suggestList.hidden = false;
        } catch { /* non-fatal */ }
      }, 300);
    });

    input.addEventListener('blur', () => setTimeout(clearSuggest, 150));

    function renderResult(data) {
      document.getElementById('result-heading').textContent =
        [data.city, data.admin1, data.country].filter(Boolean).join(', ');
      document.getElementById('r-temp').textContent     = `${data.temperature_c} °C`;
      document.getElementById('r-feels').textContent    = `${data.feels_like_c} °C`;
      document.getElementById('r-humidity').textContent = `${data.humidity_pct}%`;
      document.getElementById('r-wind').textContent     = `${data.wind_speed_kmh} km/h`;
      document.getElementById('r-desc').textContent     = data.weather_desc;
      result.hidden = false;
    }

    function renderHistory(rows) {
      histBody.innerHTML = '';
      if (!rows.length) {
        histTable.hidden = true;
        emptyMsg.hidden  = false;
        return;
      }
      emptyMsg.hidden  = true;
      histTable.hidden = false;
      rows.forEach(row => {
        const tr = document.createElement('tr');
        [
          row.city,
          row.admin1 ?? '—',
          row.country ?? '—',
          row.temperature_c,
          row.feels_like_c,
          row.humidity_pct,
          row.wind_speed_kmh,
          row.weather_desc,
          formatDate(row.searched_at),
        ].forEach(val => {
          const td = document.createElement('td');
          td.textContent = val;
          tr.appendChild(td);
        });
        histBody.appendChild(tr);
      });
    }

    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        if (!res.ok) throw new Error('Failed to load history');
        renderHistory(await res.json());
      } catch { /* non-fatal */ }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      clearSuggest();
      result.hidden = true;
      btn.disabled  = true;

      const body = { city: selectedLoc ? selectedLoc.name : input.value.trim() };
      if (selectedLoc) {
        body.latitude  = selectedLoc.latitude;
        body.longitude = selectedLoc.longitude;
        body.country   = selectedLoc.country;
        body.admin1    = selectedLoc.admin1;
      }
      selectedLoc = null;

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail ?? 'Something went wrong.');
          return;
        }

        renderResult(data);
        input.value = '';
        await loadHistory();
      } catch {
        showError('Could not reach the server. Please try again.');
      } finally {
        btn.disabled = false;
      }
    });

    loadHistory();
  </script>

</body>
</html>
